<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For all - Gestão de Recursos Humanos</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="./images/logo.png" alt="Logo">
            <span class="title">For all</span>
            <span class="subtitle">Gestão de Recursos Humanos</span>
        </div>
        <div class="auth-buttons">
            <button class="login">Login</button>
            <button class="register">Registrar</button>
        </div>
    </header>

    <nav class="navbar">
        <img src="./images/circle.png" alt="logo">
        <a href="#">Sobre Nós</a>
        <a href="#">Página Principal</a>
    </nav>

    <main class="container">
        <h1>Procura seu Futuro Emprego!</h1>
        <div class="selection-container">
            <div class="selection-box">
                <h2>Área</h2>
                <div class="buttons">
                    <button>Engenharia</button>
                    <button>Marketing</button>
                    <button>Informática</button>
                    <button>Economia</button>
                    <button>Direito</button>
                    <button>Medicina</button>
                    <button>Design</button>
                    <button>Turismo</button>
                    <button>Educação</button>
                    <button>Justiça</button>
                </div>
            </div>

            <div class="selection-box">
                <h2>Localização</h2>
                <div class="buttons">
                    <button>Lisboa</button>
                    <button>Coimbra</button>
                    <button>Setúbal</button>
                    <button>Aveiro</button>
                    <button>Algarve</button>
                    <button>Beja</button>
                    <button>Porto</button>
                    <button>Braga</button>
                    <button>Viseu</button>
                    <button>Cascais</button>
                </div>
            </div>
        </div>
        <button class="search-button">Procurar</button>
    </main>

    <footer class="footer">
        <img src="logo.png" alt="Logo">
        <span>For all</span>
    </footer>
</body>
</html>
